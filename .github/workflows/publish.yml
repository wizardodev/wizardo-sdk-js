name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write  # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - run: npm run build

      # NODE_AUTH_TOKEN not needed — npm CLI auto-detects OIDC
      # and exchanges it for a short-lived publish token.
      # Provenance attestation is generated automatically.
      - run: npm publish
