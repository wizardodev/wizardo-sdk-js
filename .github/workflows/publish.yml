name: Publish to npm

on:
  release:
    types: [created]

permissions:
  contents: read
  id-token: write  # required for OIDC trusted publishing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run build
      # Uncomment when you add tests:
      # - run: npm test

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm publish
        # No NODE_AUTH_TOKEN needed — npm CLI exchanges the OIDC token
        # (from id-token: write above) for a short-lived publish credential.
        # Provenance attestation is generated automatically.
